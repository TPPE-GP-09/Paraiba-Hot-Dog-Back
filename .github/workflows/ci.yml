name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feat-04-cardapio
  pull_request:
    branches:
      - main
      - develop
      - feat-04-cardapio

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: paraiba_hotdog_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install

      - name: Run Linter
        run: |
          pylint src/ --disable=C0304

      - name: Run Alembic migrations
        env:
          TEST_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/paraiba_hotdog_db
        run: |
          alembic upgrade head

      - name: Run Tests with Coverage
        env:
          TEST_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/paraiba_hotdog_db
        run: |
          pip install pytest-cov
          PYTHONPATH=. pytest tests/test_cardapio.py -v --cov=src --cov-report=term-missing
