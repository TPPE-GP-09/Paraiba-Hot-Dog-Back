services:
  paraiba-hotdog-back:
    command: >
      sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-paraiba_hotdog_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_API_KEY_SID: ${TWILIO_API_KEY_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-whatsapp:+14155238886}
      SMTP_RECUPERACAO_SENHA_HOST: ${SMTP_RECUPERACAO_SENHA_HOST:-}
      SMTP_RECUPERACAO_SENHA_PORT: ${SMTP_RECUPERACAO_SENHA_PORT:-587}
      SMTP_RECUPERACAO_SENHA_USERNAME: ${SMTP_RECUPERACAO_SENHA_USERNAME:-}
      SMTP_RECUPERACAO_SENHA_PASSWORD: ${SMTP_RECUPERACAO_SENHA_PASSWORD:-}
      SMTP_RECUPERACAO_SENHA_FROM_EMAIL: ${SMTP_RECUPERACAO_SENHA_FROM_EMAIL:-}
      SMTP_RECUPERACAO_SENHA_FROM_NAME: ${SMTP_RECUPERACAO_SENHA_FROM_NAME:-Paraiba Hot Dog}
      SMTP_RECUPERACAO_SENHA_STARTTLS: ${SMTP_RECUPERACAO_SENHA_STARTTLS:-true}
      SMTP_RECUPERACAO_SENHA_SSL: ${SMTP_RECUPERACAO_SENHA_SSL:-false}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      RESET_SENHA_TOKEN_MINUTOS: ${RESET_SENHA_TOKEN_MINUTOS:-30}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-paraiba_hotdog_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
