services:
  - type: web
    name: paraiba-hot-dog-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: paraiba-hot-dog-db
          property: connectionString
      - key: FRONTEND_BASE_URL
        value: https://paraiba-hot-dog.netlify.app
      - key: CORS_ORIGINS
        value: https://paraiba-hot-dog.netlify.app
      - key: KEYCLOAK_REALM
        value: paraiba-hotdog
      - key: KEYCLOAK_CLIENT_ID
        value: paraiba-hotdog-api
      - key: KEYCLOAK_USER_SYNC_ENABLED
        value: "false"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_API_KEY_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: SMTP_RECUPERACAO_SENHA_HOST
        sync: false
      - key: SMTP_RECUPERACAO_SENHA_PORT
        value: "587"
      - key: SMTP_RECUPERACAO_SENHA_USERNAME
        sync: false
      - key: SMTP_RECUPERACAO_SENHA_PASSWORD
        sync: false
      - key: SMTP_RECUPERACAO_SENHA_FROM_EMAIL
        sync: false
      - key: SMTP_RECUPERACAO_SENHA_FROM_NAME
        value: Paraiba Hot Dog
      - key: SMTP_RECUPERACAO_SENHA_STARTTLS
        value: "true"
      - key: SMTP_RECUPERACAO_SENHA_SSL
        value: "false"

databases:
  - name: paraiba-hot-dog-db
    plan: free
    databaseName: paraiba_hotdog_db
